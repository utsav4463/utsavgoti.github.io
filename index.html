<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Utsav Goti | Portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-black text-white">

<!-- Navbar -->
<nav class="flex justify-between p-6 bg-gray-900 fixed w-full z-50">
  <h1 class="text-xl font-bold">Utsav Goti</h1>
  <div class="space-x-4">
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
    <a href="assets/resume.pdf" download class="bg-blue-500 px-4 py-2 rounded">Resume</a>
  </div>
</nav>

<!-- Hero -->
<section class="h-screen flex flex-col justify-center items-center text-center">
  <h2 class="text-5xl font-bold">AI & Data Science Portfolio</h2>
  <p class="text-gray-400 mt-4">ML | AWS | Azure | NLP</p>
</section>

<!-- Filter Buttons -->
<section class="text-center mb-6">
  <button onclick="filterProjects('all')" class="mx-2">All</button>
  <button onclick="filterProjects('ml')" class="mx-2">ML</button>
  <button onclick="filterProjects('aws')" class="mx-2">AWS</button>
</section>

<!-- Projects -->
<section id="projects" class="p-10">
  <h2 class="text-3xl mb-6">Projects</h2>

  <div id="projects-container" class="grid md:grid-cols-3 gap-6"></div>
</section>

<!-- Contact -->
<section id="contact" class="p-10 text-center">
  <h2 class="text-2xl mb-4">Contact</h2>
  <p>Email: your@email.com</p>
</section>

<script>
const projects = [
  {
    name: "Stock Prediction",
    category: "ml",
    image: "assets/images/stock.png",
    link: "#",
    desc: "LSTM + Sentiment"
  },
  {
    name: "AWS Pipeline",
    category: "aws",
    image: "assets/images/aws.png",
    link: "#",
    desc: "S3 + Lambda"
  }
];

function displayProjects(list) {
  const container = document.getElementById("projects-container");
  container.innerHTML = "";

  list.forEach(p => {
    container.innerHTML += `
      <div class="bg-gray-800 p-5 rounded-lg">
        <img src="${p.image}" class="mb-3 rounded">
        <h3 class="text-xl font-bold">${p.name}</h3>
        <p class="text-gray-400">${p.desc}</p>
        <a href="${p.link}" class="text-blue-400">View</a>
      </div>
    `;
  });
}

function filterProjects(type) {
  if (type === 'all') return displayProjects(projects);
  const filtered = projects.filter(p => p.category === type);
  displayProjects(filtered);
}

displayProjects(projects);
</script>

</body>
</html>
